name: CD

on:
  push:
    branches:
      - main

jobs:

  build:  # 빌드
    runs-on: self-hosted

    steps:
      # 1. 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      # 2. JDK 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # 3. gradlew 실행 권한
      - name: Grant execute permission for Gradlew
        run: chmod +x gradlew

      # 4. SpringBoot build
      - name: Build with Gradle
        run: ./gradlew clean bootJar -Pprofile=prod

      # 5. Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. Docker Hub 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 7. Docker 이미지 빌드 + Push (cache 포함)
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy: # 배포
    runs-on: self-hosted
    needs: build

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # .env 생성
      - name: Create .env file
        run: echo "${{ secrets.ENV_DEV }}" > .env

      # 배포할 서버의 프로젝트용 디렉토리 설정
      - name: Setup deployment directory
        run: |
          mkdir -p $HOME/springboot-deep-lab
          cp docker-compose.yml $HOME/springboot-deep-lab/
          cp .env $HOME/springboot-deep-lab/

      # Docker 배포
      - name: Deploy with Docker
        run: |
          cd $HOME/springboot-deep-lab
          docker compose pull
          docker compose up -d
