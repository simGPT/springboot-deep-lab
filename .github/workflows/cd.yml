name: CD

on:
  push:
    branches:
      - main

jobs:

  build:  # 빌드
    runs-on: ubuntu-latest # github 서버 사용
    environment: ENV_DEV

    steps:
      # 1. 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GIT_ACTIONS_PAT }}

      # 2. JDK 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # 3. gradlew 실행 권한
      - name: Grant execute permission for Gradlew
        run: chmod +x gradlew

      # 4. SpringBoot build
      - name: Build with Gradle
        run: ./gradlew clean bootJar -Pprofile=prod

      # 5. Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. Docker Hub 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 7. Docker 이미지 빌드 + Push (cache 포함)
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy: # 배포
    runs-on: ubuntu-latest # github 서버 사용
    needs: build
    environment: ENV_DEV

    steps:
      - name: Deploy to Server via SSH # 서버에 SSH로 접속
        uses: appleboy/ssh-action@v1.0.3 # 원격 접속 도구(라이브러리) 사용
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p $HOME/springboot-deep-lab
            cd $HOME/springboot-deep-lab
            
            echo "${{ secrets.ENV_DEV }}" > .env
            
            cat <<EOF > docker-compose.yml
            services:
              app:
                image: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest
                container_name: deep-lab-container
                restart: always
                ports:
                  - "8080:8080"
                environment:
                  SPRING_PROFILES_ACTIVE: dev
                  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/\${DB_NAME}
                  SPRING_DATASOURCE_USERNAME: \${DB_USER}
                  SPRING_DATASOURCE_PASSWORD: \${DB_PASS}
                  TZ: Asia/Seoul
                depends_on:
                  postgres-db:
                    condition: service_healthy
                networks:
                  - deep-lab-network

              postgres-db:
                image: postgres:15
                container_name: postgres-db
                restart: always
                environment:
                  POSTGRES_DB: \${DB_NAME}
                  POSTGRES_USER: \${DB_USER}
                  POSTGRES_PASSWORD: \${DB_PASS}
                  TZ: Asia/Seoul
                volumes:
                  - postgres-data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U postgres"]
                  interval: 5s
                  timeout: 5s
                  retries: 5
                networks:
                  - deep-lab-network

            networks:
              deep-lab-network:
                driver: bridge

            volumes:
              postgres-data:
            EOF

            docker compose pull
            docker compose up -d
            docker image prune -f
